name: Validate Mermaid

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'devtools/**'
      - 'package*.json'
      - '.github/workflows/validate-mermaid.yml'
  pull_request:
    paths:
      - '**/*.md'
      - 'devtools/**'
      - 'package*.json'
      - '.github/workflows/validate-mermaid.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate:mermaid
